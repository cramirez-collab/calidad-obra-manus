<!doctype html>
<html lang="es">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <title>ObjetivaQC</title>
    
    <!-- ANTI-CACHE: Forzar siempre versión más reciente -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="ObjetivaQC - Sistema de control de calidad de obra" />
    <meta name="theme-color" content="#02B381" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ObjetivaQC" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663201051818/XafbgGaUxbtStcxB.png" />
    <!-- Android Chrome -->
    <link rel="icon" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" sizes="512x512" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663201051818/XafbgGaUxbtStcxB.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- Splash Screen durante la carga -->
    <div id="splash-screen" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ffffff 0%, #f0f9f6 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    ">
      <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663201051818/XafbgGaUxbtStcxB.png" alt="ObjetivaQC" style="width: 120px; height: 120px; margin-bottom: 20px;" />
      <div style="font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; color: #002C63;">
        <span style="color: #02B381;">ObjetivaQC</span>
      </div>
      <div style="margin-top: 30px;">
        <div style="
          width: 40px;
          height: 40px;
          border: 3px solid #e5e7eb;
          border-top-color: #02B381;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        "></div>
      </div>
      <style>
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
    
    <!-- ============================================ -->
    <!-- SISTEMA DE ACTUALIZACIÓN OBLIGATORIA v3.93   -->
    <!-- VERSIÓN UNIFICADA: Debe coincidir con        -->
    <!-- shared/version.ts VERSION_NUMBER = 393       -->
    <!-- ============================================ -->
    <script>
      (function() {
        // ⚠️ MANTENER SINCRONIZADO CON shared/version.ts
        const REQUIRED_VERSION = 3972;
        const DISPLAY_VERSION = 'v3.97.2';
        const VERSION_KEY = 'oqc_app_version';
        const UPDATING_KEY = 'oqc_updating';
        
        window.OQC_VERSION = REQUIRED_VERSION;
        window.OQC_DISPLAY_VERSION = DISPLAY_VERSION;
        
        const storedVersion = parseInt(localStorage.getItem(VERSION_KEY) || '0');
        const isUpdating = sessionStorage.getItem(UPDATING_KEY) === 'true';
        
        console.log('[VERSION] Requerida:', REQUIRED_VERSION, '(' + DISPLAY_VERSION + ') | Local:', storedVersion);
        
        // FORZAR ACTUALIZACIÓN SI LA VERSIÓN ES DIFERENTE
        if (storedVersion !== REQUIRED_VERSION && !isUpdating) {
          console.log('[VERSION] Versión incorrecta - forzando actualización...');
          
          sessionStorage.setItem(UPDATING_KEY, 'true');
          
          (async function cleanUpdate() {
            try {
              // 1. Desregistrar Service Workers
              if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (const reg of regs) {
                  await reg.unregister();
                }
                console.log('[VERSION] ' + regs.length + ' SW desregistrados');
              }
              
              // 2. Limpiar caches
              if ('caches' in window) {
                const names = await caches.keys();
                await Promise.all(names.map(function(n) { return caches.delete(n); }));
                console.log('[VERSION] ' + names.length + ' caches eliminadas');
              }
              
              // 3. Preservar datos críticos
              var proyectoId = localStorage.getItem('selectedProjectId');
              var offlineQueue = localStorage.getItem('oqc_offline_queue');
              
              // 4. Limpiar storage
              localStorage.clear();
              sessionStorage.clear();
              
              // 5. Restaurar datos críticos
              if (proyectoId) localStorage.setItem('selectedProjectId', proyectoId);
              if (offlineQueue) localStorage.setItem('oqc_offline_queue', offlineQueue);
              
              // 6. Establecer nueva versión
              localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
              localStorage.setItem('oqc_installed_version', REQUIRED_VERSION.toString());
              sessionStorage.setItem(UPDATING_KEY, 'done');
              
              // 7. Recargar limpio
              console.log('[VERSION] Recargando...');
              window.location.replace(window.location.origin + '/?_v=' + REQUIRED_VERSION + '&_t=' + Date.now());
              
            } catch (e) {
              console.error('[VERSION] Error:', e);
              localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
              localStorage.setItem('oqc_installed_version', REQUIRED_VERSION.toString());
              window.location.replace(window.location.origin + '/?_force=' + Date.now());
            }
          })();
          
          return;
        }
        
        // Limpiar flag de actualización
        if (isUpdating || sessionStorage.getItem(UPDATING_KEY) === 'done') {
          sessionStorage.removeItem(UPDATING_KEY);
          localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
          localStorage.setItem('oqc_installed_version', REQUIRED_VERSION.toString());
          console.log('[VERSION] Actualización completada: ' + DISPLAY_VERSION);
        }
        
        // Version checker periódico ELIMINADO de index.html
        // Solo main.tsx hace version check para evitar doble reload
        
      })();
    </script>
    
    <!-- SW se registra SOLO en main.tsx para evitar doble registro y reload loops -->
  </body>

</html>
