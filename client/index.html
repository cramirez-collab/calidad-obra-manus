<!doctype html>
<html lang="es">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <title>ObjetivaQC</title>
    
    <!-- ANTI-CACHE: Forzar siempre versión más reciente -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="ObjetivaQC - Sistema de control de calidad de obra" />
    <meta name="theme-color" content="#02B381" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ObjetivaQC" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <!-- Android Chrome -->
    <link rel="icon" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" sizes="512x512" href="/icon-512.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- Splash Screen durante la carga -->
    <div id="splash-screen" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ffffff 0%, #f0f9f6 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    ">
      <img src="/icon-512.png" alt="ObjetivaQC" style="width: 120px; height: 120px; margin-bottom: 20px;" />
      <div style="font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; color: #002C63;">
        <span style="color: #02B381;">ObjetivaQC</span>
      </div>
      <div style="margin-top: 30px;">
        <div style="
          width: 40px;
          height: 40px;
          border: 3px solid #e5e7eb;
          border-top-color: #02B381;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        "></div>
      </div>
      <style>
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
    
    <!-- ============================================ -->
    <!-- SISTEMA DE ACTUALIZACIÓN NUCLEAR v46 -->
    <!-- MANDATORIO: objetivaqc.com -->
    <!-- TODOS los dispositivos DEBEN tener v46 -->
    <!-- NOTIFICACIONES PUSH SUPER AGRESIVAS -->
    <!-- ============================================ -->
    <script>
      (function() {
        const REQUIRED_VERSION = 46;
        const VERSION_KEY = 'oqc_app_version';
        const FORCE_UPDATE_KEY = 'oqc_force_update';
        const PENDING_DATA_KEY = 'oqc_has_pending';
        
        // Verificar versión inmediatamente (antes de cargar React)
        const storedVersion = parseInt(localStorage.getItem(VERSION_KEY) || '0');
        const forceUpdate = sessionStorage.getItem(FORCE_UPDATE_KEY);
        
        console.log('[VersionCheck] Versión requerida:', REQUIRED_VERSION, 'Versión almacenada:', storedVersion);
        
        // Función para verificar si hay datos pendientes en IndexedDB
        async function hasPendingData() {
          return new Promise((resolve) => {
            try {
              const request = indexedDB.open('objetiva-qc-offline', 1);
              request.onerror = () => resolve(false);
              request.onsuccess = () => {
                const db = request.result;
                if (!db.objectStoreNames.contains('pendingActions')) {
                  db.close();
                  resolve(false);
                  return;
                }
                const tx = db.transaction('pendingActions', 'readonly');
                const store = tx.objectStore('pendingActions');
                const countReq = store.count();
                countReq.onsuccess = () => {
                  const count = countReq.result;
                  db.close();
                  console.log('[VersionCheck] Acciones pendientes:', count);
                  resolve(count > 0);
                };
                countReq.onerror = () => {
                  db.close();
                  resolve(false);
                };
              };
            } catch (e) {
              resolve(false);
            }
          });
        }
        
        // Si la versión es antigua Y no estamos ya en proceso de actualización
        if (storedVersion < REQUIRED_VERSION && forceUpdate !== 'done') {
          console.log('[VersionCheck] Versión antigua detectada. Verificando datos pendientes...');
          
          // Marcar que estamos actualizando
          sessionStorage.setItem(FORCE_UPDATE_KEY, 'in_progress');
          
          // Verificar datos pendientes antes de limpiar
          (async function() {
            try {
              const hasPending = await hasPendingData();
              
              if (hasPending) {
                // HAY DATOS PENDIENTES - NO BORRAR IndexedDB
                console.log('[VersionCheck] ¡DATOS PENDIENTES DETECTADOS! Actualizando sin borrar datos offline...');
                
                // 1. Solo desregistrar Service Workers viejos
                if ('serviceWorker' in navigator) {
                  const regs = await navigator.serviceWorker.getRegistrations();
                  for (const reg of regs) {
                    await reg.unregister();
                    console.log('[VersionCheck] SW desregistrado');
                  }
                }
                
                // 2. Limpiar solo caches del SW (NO IndexedDB)
                if ('caches' in window) {
                  const names = await caches.keys();
                  await Promise.all(names.map(n => caches.delete(n)));
                  console.log('[VersionCheck] Caches SW eliminados (IndexedDB preservado)');
                }
                
                // 3. Actualizar versión pero preservar todo localStorage
                localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
                localStorage.setItem(PENDING_DATA_KEY, 'true');
                
              } else {
                // NO HAY DATOS PENDIENTES - Limpieza completa segura
                console.log('[VersionCheck] Sin datos pendientes. Limpieza completa...');
                
                // 1. Desregistrar todos los Service Workers
                if ('serviceWorker' in navigator) {
                  const regs = await navigator.serviceWorker.getRegistrations();
                  for (const reg of regs) {
                    await reg.unregister();
                  }
                }
                
                // 2. Limpiar todos los caches
                if ('caches' in window) {
                  const names = await caches.keys();
                  await Promise.all(names.map(n => caches.delete(n)));
                }
                
                // 3. Limpiar localStorage (preservar proyecto)
                const proyecto = localStorage.getItem('selectedProjectId');
                localStorage.clear();
                if (proyecto) localStorage.setItem('selectedProjectId', proyecto);
                localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
              }
              
              // 4. Marcar como completado
              sessionStorage.setItem(FORCE_UPDATE_KEY, 'done');
              
              // 5. Recargar con cache-bust
              console.log('[VersionCheck] Recargando con versión v' + REQUIRED_VERSION + '...');
              window.location.href = window.location.origin + '?_v=' + Date.now();
            } catch (e) {
              console.error('[VersionCheck] Error:', e);
              localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
              sessionStorage.setItem(FORCE_UPDATE_KEY, 'done');
              window.location.reload();
            }
          })();
        } else if (forceUpdate === 'in_progress') {
          // Actualización en progreso, completar
          console.log('[VersionCheck] Completando actualización...');
          localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
          sessionStorage.setItem(FORCE_UPDATE_KEY, 'done');
        } else {
          // Versión correcta
          console.log('[VersionCheck] Versión correcta v' + REQUIRED_VERSION);
          localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
          sessionStorage.removeItem(FORCE_UPDATE_KEY);
        }
      })();
    </script>
    
    <!-- Register Service Worker (después de verificación de versión) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then((registration) => {
              console.log('[PWA] Service Worker registered:', registration.scope);
              // Forzar actualización del SW
              registration.update();
            })
            .catch((error) => {
              console.log('[PWA] Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>

</html>
