<!doctype html>
<html lang="es">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    <title>ObjetivaQC</title>
    
    <!-- ANTI-CACHE: Forzar siempre versión más reciente -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="ObjetivaQC - Sistema de control de calidad de obra" />
    <meta name="theme-color" content="#02B381" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ObjetivaQC" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663201051818/XafbgGaUxbtStcxB.png" />
    <!-- Android Chrome -->
    <link rel="icon" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" sizes="512x512" href="https://files.manuscdn.com/user_upload_by_module/session_file/310519663201051818/XafbgGaUxbtStcxB.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- Splash Screen durante la carga -->
    <div id="splash-screen" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ffffff 0%, #f0f9f6 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    ">
      <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663201051818/XafbgGaUxbtStcxB.png" alt="ObjetivaQC" style="width: 120px; height: 120px; margin-bottom: 20px;" />
      <div style="font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; color: #002C63;">
        <span style="color: #02B381;">ObjetivaQC</span>
      </div>
      <div style="margin-top: 30px;">
        <div style="
          width: 40px;
          height: 40px;
          border: 3px solid #e5e7eb;
          border-top-color: #02B381;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        "></div>
      </div>
      <style>
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
    
    <!-- ============================================ -->
    <!-- SISTEMA DE ACTUALIZACIÓN OBLIGATORIA v67 (v2.23) -->
    <!-- MANDATORIO: objetivaqc.com -->
    <!-- FORZAR SIEMPRE LA ÚLTIMA VERSIÓN -->
    <!-- NO PERMITIR VERSIONES ANTIGUAS -->
    <!-- ============================================ -->
    <script>
      (function() {
        const REQUIRED_VERSION = 67;
        const VERSION_KEY = 'oqc_app_version';
        const UPDATING_KEY = 'oqc_updating';
        
        // Formato de versión profesional (dividir entre 30)
        window.OQC_VERSION = REQUIRED_VERSION;
        window.OQC_DISPLAY_VERSION = 'v' + (REQUIRED_VERSION / 30).toFixed(2);
        
        // Obtener versión almacenada
        const storedVersion = parseInt(localStorage.getItem(VERSION_KEY) || '0');
        const isUpdating = sessionStorage.getItem(UPDATING_KEY) === 'true';
        
        console.log('[ACTUALIZACIÓN OBLIGATORIA] Versión requerida:', REQUIRED_VERSION, '| Versión local:', storedVersion);
        
        // FORZAR ACTUALIZACIÓN SI LA VERSIÓN ES DIFERENTE
        if (storedVersion !== REQUIRED_VERSION && !isUpdating) {
          console.log('[ACTUALIZACIÓN OBLIGATORIA] ⚠️ VERSIÓN INCORRECTA - FORZANDO ACTUALIZACIÓN...');
          
          // Marcar que estamos actualizando para evitar loop
          sessionStorage.setItem(UPDATING_KEY, 'true');
          
          // Función de limpieza nuclear
          (async function nuclearUpdate() {
            try {
              // 1. ELIMINAR TODOS LOS SERVICE WORKERS
              if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                console.log('[NUCLEAR] Eliminando', regs.length, 'Service Workers...');
                for (const reg of regs) {
                  await reg.unregister();
                }
              }
              
              // 2. ELIMINAR TODOS LOS CACHES
              if ('caches' in window) {
                const names = await caches.keys();
                console.log('[NUCLEAR] Eliminando', names.length, 'caches...');
                await Promise.all(names.map(n => caches.delete(n)));
              }
              
              // 3. PRESERVAR SOLO DATOS CRÍTICOS
              const proyectoId = localStorage.getItem('selectedProjectId');
              const offlineQueue = localStorage.getItem('oqc_offline_queue');
              
              // 4. LIMPIAR TODO EL STORAGE
              localStorage.clear();
              sessionStorage.clear();
              
              // 5. RESTAURAR DATOS CRÍTICOS
              if (proyectoId) localStorage.setItem('selectedProjectId', proyectoId);
              if (offlineQueue) localStorage.setItem('oqc_offline_queue', offlineQueue);
              
              // 6. ESTABLECER NUEVA VERSIÓN
              localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
              sessionStorage.setItem(UPDATING_KEY, 'done');
              
              // 7. FORZAR RECARGA DESDE SERVIDOR
              console.log('[NUCLEAR] Recargando desde servidor...');
              const timestamp = Date.now();
              const random = Math.random().toString(36).substring(7);
              window.location.replace(window.location.origin + '/?_nuclear=' + timestamp + '&_r=' + random);
              
            } catch (e) {
              console.error('[NUCLEAR] Error:', e);
              // Forzar recarga de todos modos
              localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
              window.location.replace(window.location.origin + '/?_force=' + Date.now());
            }
          })();
          
          // Detener ejecución mientras se actualiza
          return;
        }
        
        // Limpiar flag de actualización si ya terminó
        if (isUpdating || sessionStorage.getItem(UPDATING_KEY) === 'done') {
          sessionStorage.removeItem(UPDATING_KEY);
          localStorage.setItem(VERSION_KEY, REQUIRED_VERSION.toString());
          console.log('[ACTUALIZACIÓN OBLIGATORIA] ✅ Actualización completada a v' + REQUIRED_VERSION);
        }
        
        // Verificar periódicamente que la versión sea correcta
        setInterval(function() {
          const currentStored = parseInt(localStorage.getItem(VERSION_KEY) || '0');
          if (currentStored !== REQUIRED_VERSION) {
            console.log('[VERIFICACIÓN] Versión incorrecta detectada, forzando actualización...');
            localStorage.setItem(VERSION_KEY, '0');
            window.location.reload();
          }
        }, 30000); // Verificar cada 30 segundos
        
      })();
    </script>
    
    <!-- Register Service Worker (después de verificación de versión) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then((registration) => {
              console.log('[PWA] Service Worker registered:', registration.scope);
              // Forzar actualización del SW
              registration.update();
            })
            .catch((error) => {
              console.log('[PWA] Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>

</html>
